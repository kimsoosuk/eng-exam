    // ==================== EXAM DATA ====================
    const PASSAGE_41_42 = `Some researchers view spoken languages as incomplete devices for capturing precise differences. They think numbers represent the most neutral language of description. However, when our language of description is changed to numbers, we do not move toward greater (a) accuracy . Numbers are no more 'appropriate pictures of the world' than words, music, or painting. While useful for specific purposes (e.g. census taking, income distribution), they (b) include information of enormous value. For example, the future lives of young students are tied to their scores on national tests. In effect, whether they can continue with their education, where, and at what cost depends importantly on a handful of numbers. These numbers do not account for the (c) quality of schools they have attended, whether they have been tutored, have supportive parents, have test anxiety, and so on. Finally, putting aside the many ways in which statistical results can be manipulated, there are ways in which turning people's lives into numbers is (d) morally insulating . Statistics on crime, homelessness, or the spread of a disease say nothing of people's suffering. We read the statistics as reports on events at a distance, thus allowing us to (e) escape without being disturbed. Statistics are human beings with the tears wiped off. Quantify with caution.`;

    const PASSAGE_43_45 = `(A) Jack, an Arkansas farmer, was unhappy because he couldn't make enough money from his farm. He worked hard for many years, but things didn't improve. He sold his farm to his neighbor, Victor, who was by no means wealthy. Hoping for a fresh start, he left for the big city to find better opportunities. Years passed, but Jack still couldn't find the fortune he was looking for. Tired and broke, (a) he returned to the area where his old farm was.\n(B) "How did you do all this?" he asked. And he continued, "When you bought the farm, you barely had any money. How did you get so rich?" Victor smiled and said, "I owe it all to (b) you . There were diamonds on this land ― acres and acres of diamonds! I got rich because I discovered those diamonds." "Diamonds?" Jack said in disbelief. And he said, "I knew every part of that land, and there were no diamonds!"\n(C) Victor reached into his pocket and carefully pulled out something small and shiny. Holding it between (c) his fingers, he let it catch the light. He said, "This is a diamond." Jack was amazed and said, "I saw so many rocks like that and thought they were useless. They made farming so hard!" Victor laughed and said, "(d) You didn't know what diamonds look like. Sometimes, treasures are hidden right in front of us."\n(D) One day, he drove past his old land and was shocked by what he saw. Victor, the man who had bought the farm with very little money, now seemed to be living a life of great success. He had torn down the farmhouse and built a massive house in its place. New buildings, trees, and flowers adorned the well-kept property. Jack could hardly believe that (e) he had ever worked on this same land. Curious, he stopped to talk to Victor.`;

    const EXAM_DATA = [
      { id: 18, category: "문학 (목적)", content: `Dear Miranda,\nThank you for participating in our Crafts Art Fair. Since we've chosen you as one of the 'Artists of This Year', we are looking forward to introducing your unique handmade baskets to our community. As part of organizing the exhibition plan, we are happy to inform you that your artworks will be exhibited at the assigned table, number seven. Visitors can easily find your artworks located near the entrance. If you have any special requirements or need further assistance, feel free to contact us in advance.\nSincerely,\nHelen Dwyer`, options: ["① 공예품 구매 희망자를 소개하려고", "② 비상시 박람회장 대피 동선을 안내하려고", "③ 작품이 전시될 지정 테이블을 알려 주려고", "④ 올해의 공예가 선정 투표 방식을 공지하려고", "⑤ 박람회에 참여할 새로운 공예가를 모집하려고"], answer: 3 },
      { id: 19, category: "문학 (심경)", content: `The shed is cold and damp, the air thick with the smell of old wood and earth. It's dark, and I can't make out what's moving in the shadows. "Who's there?" I ask, my voice shaking with fear. The shadow moves closer, and my heart is beating fast until the figure steps into a faint beam of light breaking through a crack in the wall. A rabbit. A laugh escapes my lips as it stares at me with wide, curious eyes. "You scared me," I say, feeling much better. The rabbit pauses for a moment, then hops away, disappearing back into the shadows. I'm left smiling. I start to feel at ease.`, options: ["① envious → hopeful", "② relieved → disappointed", "③ frightened → relieved", "④ anxious → curious", "⑤ excited → angry"], answer: 3 },
      { id: 20, category: "사회 (주장)", content: `Improving your gestural communication involves more than just knowing when to nod or shake hands. It's about using gestures to complement your spoken messages, adding layers of meaning to your words. Open-handed gestures, for example, can indicate honesty, creating an atmosphere of trust. You invite openness and collaboration when you speak with your palms facing up. This simple yet powerful gesture can make others feel more comfortable and willing to engage in conversation. But be careful of the trap of over-gesturing. Too many hand movements can distract from your message, drawing attention away from your words. Imagine a speaker whose hands move quickly like birds, their message lost in the chaos of their gestures. Balance is key. Your gestures should highlight your words, not overshadow them.`, options: ["① 메시지를 잘 전달하기 위해서 열린 마음을 지녀야 한다.", "② 효과적인 의사소통을 위해 몸짓을 적절히 사용해야 한다.", "③ 청중의 반응을 파악하기 위해 그들의 몸짓에 주목해야 한다.", "④ 전달하고자 하는 것을 감추기보다 직접적으로 표현해야 한다.", "⑤ 상대방을 설득하기 위해서는 메시지를 반복적으로 강조해야 한다."], answer: 2 },
      { id: 21, category: "과학 (함축 의미)", content: `Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems. Yet once it becomes possible to transform an embryo's mutated genes into "normal" ones, there will certainly be temptations to upgrade normal genes to superior versions. Should we begin editing genes in unborn children to lower their lifetime risk of heart disease or cancer? What about giving unborn children beneficial features, like greater strength and increased mental abilities, or changing physical characteristics, like eye and hair color? The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.`, options: ["① allow genetic alterations to upgrade humans", "② stick to the traditional beliefs in human nature", "③ resist the temptation to change genes in humans", "④ fail to reduce the risk of suffering from diseases", "⑤ consider more about the moral issues of genetics"], answer: 1 },
      { id: 22, category: "과학 (요지)", content: `The science we learn in grade school is a collection of certainties about the natural world ― the earth goes around the sun, DNA carries the information of an organism, and so on. Only when you start to learn the practice of science do you realize that each of these "facts" was hard won through a succession of logical inferences based upon many observations or experiments. The process of science is less about collecting pieces of knowledge than it is about reducing the uncertainties in what we know. Our uncertainties can be greater or lesser for any given piece of knowledge depending upon where we are in that process ― today we are quite certain of how an apple will fall from a tree, but our understanding of the turbulent fluid flow remains a work in progress after more than a century of effort.`, options: ["① 과학은 현재의 지식에 대한 불확실함을 줄이는 과정이다.", "② 관찰과 실험 과정에서 우연히 얻어진 과학적 사실이 많다.", "③ 학생들에게 다양한 연구 방법을 가르치는 것이 중요하다.", "④ 과학 연구에서는 정확한 실험 과정 설계가 핵심이다.", "⑤ 과학은 분산된 지식을 수집하여 통합하는 학문이다."], answer: 1 },
      { id: 23, category: "사회 (주제)", content: `There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated. And it is not just those people with power ― we need to feel valued and respected by peers and coworkers. Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there. If we are trying to motivate others, a caring relationship is a crucial basis from which to begin. And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence. So exercise with a friend, call someone when you have a difficult decision to make, and be there as a support for others as they take on challenges.`, options: ["① ways of getting out of dependent relationships", "② necessity of independent decision-making for happier life", "③ key factors required for boosting a competitive atmosphere", "④ challenges in maintaining lasting bonds with family members", "⑤ importance of building connected relationships in motivation"], answer: 5 },
      { id: 24, category: "과학 (제목)", content: `Modern brain-scanning techniques such as fMRI (functional Magnetic Resonance Imaging) have revealed that reading aloud lights up many areas of the brain. There is intense activity in areas associated with pronunciation and hearing the sound of the spoken response, which strengthens the connective structures of your brain cells for more brainpower. This leads to an overall improvement in concentration. Reading aloud is also a good way to develop your public speaking skills because it forces you to read each and every word ― something people don't often do when reading quickly, or reading in silence. Children, in particular, should be encouraged to read aloud because the brain is wired for learning through connections that are created by positive stimulation, such as singing, touching, and reading aloud.`, options: ["① Reading Aloud: Improving Brainpower and Speaking Skills", "② Reading Practices: Shortcuts to Academic Achievements", "③ Improve Your Writing Skills Through Reading Aloud", "④ How Your Brain Changes When You Read in Silence", "⑤ Techniques for Faster and More Effective Reading"], answer: 1 },
      { id: 26, category: "인물 (불일치)", content: `Robert E. Lucas, Jr. was born on September 15, 1937, in Yakima, Washington. During World War II, his family moved to Seattle, where he graduated from Roosevelt High School. At the University of Chicago, he majored in history. After taking economic history courses at University of California, Berkeley, he developed an interest in economics. He earned a doctoral degree in economics from the University of Chicago in 1964. He taught at Carnegie Mellon University from 1963 to 1974 before returning to the University of Chicago to become a professor of economics. He was known as a very influential economist and, in 1995, he was awarded the Nobel Prize in Economic Sciences.`, options: ["① 제2차 세계대전 중에 그의 가족이 Seattle로 이주했다.", "② 경제사를 수강한 후에 경제학에 대한 흥미를 키웠다.", "③ University of Chicago에서 경제학 박사 학위를 받았다.", "④ 1963년부터 1974년까지 University of Chicago에서 가르쳤다.", "⑤ 1995년에 노벨상을 수상했다."], answer: 4 },
      { id: 29, category: "과학 (어법)", content: `Routines enable athletes to evaluate competition conditions. For example, bouncing a ball in a volleyball service routine ① supplies the server with information about the ball, the floor, and the state of her muscles. This information can then be used to ② properly prepare for her serve. Routines also enable athletes to adjust and fine-tune their preparations ③ based on those evaluations or in pursuit of a particular competitive goal. This adaptation can involve adjustment to the conditions, rivals, competitive situation, or internal influences ④ what can affect performance. Just like adjusting a race-car engine to the conditions of the track, air temperature, and weather, routines adjust all competitive components ⑤ to achieve proper performance.`, options: ["① supplies", "② properly", "③ based", "④ what", "⑤ to achieve"], answer: 4 },
      { id: 30, category: "사회 (어휘)", content: `Promotion deals with consumer psychology. We can't ① force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible. By doing so, the possibility of increasing sales goes up. Gone are the days when promotions were done in order to ② fool the consumer into purchasing something. The long-term effect of getting a consumer to buy something they did not really want or need wasn't good. In fact, consumers fooled once can do ③ damage to sales as they relate their experience to others. Instead, marketers now know that their goal is to ④ identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer. Therefore, marketers must know where the ⑤ uninterested consumers are, and how to reach them.`, options: ["① force", "② fool", "③ damage", "④ identify", "⑤ uninterested"], answer: 5 },
      { id: 31, category: "인문 (빈칸)", content: `Plato argued that when you see something that strikes you as beautiful, you are really just seeing a partial reflection of true beauty, just as a painting or even a photograph only captures part of the real thing. True beauty, or what Plato calls the Form of Beauty, has no particular color, shape, or size. Rather, it is a(n) ________ idea, like the number five. You can make drawings of the number five in blue or red ink, big or small, but the number five itself is none of those things. It has no physical form. Think of the idea of a triangle, for example. Although it has no particular color or size, it somehow lies within each and every triangle you see. Plato thought the same was true of beauty. The Form of Beauty somehow lies within each and every beautiful thing you see.`, options: ["① abstract", "② practical", "③ imperfect", "④ visualized", "⑤ changeable"], answer: 1 },
      { id: 32, category: "인문 (빈칸)", content: `As you listen to your child in an emotional moment, be aware that ________ usually works better than asking questions to get a conversation rolling. You may ask your child "Why do you feel sad?" and she may not have a clue. As a child, she may not have an answer on the tip of her tongue. Maybe she's feeling sad about her parents' arguments, or because she feels overtired, or she's worried about a piano recital. But she may or may not be able to explain any of this. And even when she does come up with an answer, she might be worried that the answer is not good enough to justify the feeling. Under these circumstances, a series of questions can just make a child silent. It's better to simply reflect what you notice. You can say, "You seem a little tired today," or, "I noticed that you frowned when I mentioned the recital," and wait for her response.`, options: ["① giving quick advice", "② pushing her for answers", "③ sharing simple observations", "④ telling your own life stories", "⑤ leaving her alone to cool down"], answer: 3 },
      { id: 33, category: "과학 (빈칸)", content: `Our skin conducts electricity more or less efficiently, depending on our emotions. We know that when we're emotionally stimulated — stressed, sad, any intense emotion, really — our bodies sweat a tiny bit, so little we might not even notice. And when those tiny drops of sweat appear, our skin gets more electrically conductive. This change in sweat gland activity happens completely without your conscious mind having much say in the matter. If you feel emotionally intense, you're going to notice an increase in sweat gland activity. This is particularly useful from a scientific viewpoint, because it allows us to put an objective value on a subjective state of mind. We can actually ________ by tracking how your body subconsciously sweats, by running a bit of electricity through your skin. We can then turn the subjective, subconscious experience of emotional intensity into an objective number by figuring out how good your skin gets at transferring an electrical current.`, options: ["① limit reactions of hormones", "② control the electrical current", "③ improve your skin conditions", "④ measure your emotional state", "⑤ diversify emotional experiences"], answer: 4 },
      { id: 34, category: "과학 (빈칸)", content: `Plants can communicate, although not in the same way we do. Some express their discontent through scents. You know that smell that hangs in the air after you've mowed the lawn? Yeah, that's actually an SOS. Some plants use sound. Yes, sound, though at a frequency that we can't hear. Researchers experimented with plants and microphones to see if they could record any trouble calls. They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors. The sound a plant makes when it's not getting watered differs from the one it'll make when a leaf is cut. However, it's worth noting that experts don't think plants are crying out in pain. It's more likely that these reactions are knee-jerk survival actions. Plants are living organisms, and their main objective is to survive. Scents and sounds are their tools for ________.`, options: ["① defending against things that might harm them", "② showing their support for neighboring plants", "③ hiding their pains and dissatisfaction", "④ sharing nutrients with other plants", "⑤ changing their genetic structure"], answer: 1 },
      { id: 35, category: "인문 (무관한 문장)", content: `What does it mean for a character to be a hero as opposed to a villain? In artistic and entertainment descriptions, it's essential for the author to establish a positive relationship between a protagonist and the audience. ① In order for tragedy or misfortune to draw out an emotional response in viewers, the character must be adjusted so as to be recognizable as either friend or enemy. ② Likewise, the line between friends and enemies is not clear in reality. ③ Whether the portrayal is fictional or documentary, we must feel that the protagonist is someone whose actions benefit us — the protagonist is, or would be, a worthy companion or valued ally. ④ Violent action films are often filled with dozens of incidental deaths of minor characters that draw out little response in the audience. ⑤ In order to feel strong emotions, the audience must be emotionally invested in a character as either ally or enemy.`, options: ["①", "②", "③", "④", "⑤"], answer: 2 },
      { id: 36, category: "인문 (순서)", content: `Let's assume that at least some animals are capable of thinking despite lacking a language.\n(A) This doesn't imply that squirrels lack concepts, simply that they don't need them for this concrete form of thinking. For us to be able to say that an animal has concepts, we have to show not just that she's capable of thinking, but also that she has certain specific abilities.\n(B) To do this, in principle she doesn't need a concept of branch nor a concept of tree. It might be enough for her to have, for example, the ability to think in images ― to make a mental map of the tree where she can imagine and try out different routes.\n(C) This doesn't necessarily mean that they possess concepts, for some forms of thought may be nonconceptual. We can imagine, for instance, a squirrel who is planning how to get from the branch she's currently standing on to a branch from the tree in front.`, options: ["① (A)-(C)-(B)", "② (B)-(A)-(C)", "③ (B)-(C)-(A)", "④ (C)-(A)-(B)", "⑤ (C)-(B)-(A)"], answer: 5 },
      { id: 37, category: "과학 (순서)", content: `Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee.\n(A) This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure.\n(B) The cartilage in your left knee then "drinks in" synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage.\n(C) Imagine for a moment that you're looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released.`, options: ["① (A)-(C)-(B)", "② (B)-(A)-(C)", "③ (B)-(C)-(A)", "④ (C)-(A)-(B)", "⑤ (C)-(B)-(A)"], answer: 5 },
      { id: 38, category: "인문 (문장 삽입)", content: `[주어진 문장] Rather, it is self-constructed as kids play with other kids.\n\nPiaget argued that children's understanding of morality is like their understanding of those water glasses: we can't say that it is innate or kids learn it directly from adults. Piaget put the same amount of water into two different glasses: a tall narrow glass and a wide glass, then asked kids to compare two glasses. ( ① ) Kids younger than six or seven usually say that the tall narrow glass now holds more water, because the level is higher. ( ② ) And when they are ready, they figure out the conservation of volume for themselves just by playing with cups of water. ( ③ ) Taking turns in a game is like pouring water back and forth between glasses. ( ④ ) Once kids have reached the age of five or six, then playing games and working things out together will help them learn about fairness far more effectively than any teaching from adults. ( ⑤ )`, options: ["①", "②", "③", "④", "⑤"], answer: 3 },
      { id: 39, category: "과학 (문장 삽입)", content: `[주어진 문장] But all this wisdom about how to deal with heat, accumulated over centuries of practical experience, is all too often ignored.\n\nThe rise of air-conditioning accelerated the construction of sealed boxes, where the building's only airflow is through the filtered ducts of the air-conditioning unit. It doesn't have to be this way. Look at any old building in a hot climate, whether it's in Sicily or Marrakesh or Tehran. ( ① ) Architects understood the importance of shade, airflow, light colors. ( ② ) They oriented buildings to capture cool breezes and block the worst heat of the afternoon. ( ③ ) They built with thick walls and white roofs and transoms over doors to encourage airflow. ( ④ ) Anyone who has ever spent a few minutes in a mudbrick house in Tucson, or walked on the narrow streets of old Seville, knows how well these construction methods work. ( ⑤ ) In this sense, air-conditioning is not just a technology of personal comfort; it is also a technology of forgetting.`, options: ["①", "②", "③", "④", "⑤"], answer: 5 },
      { id: 40, category: "인문 (요약문)", content: `In the course of trying to solve a problem with an invention, you may encounter a brick wall of resistance when you try to think your way logically through the problem. Such logical thinking is a linear type of process, which uses our reasoning skills. This works fine when we're operating in the area of what we know or have experienced. However, when we need to deal with new information, ideas, and viewpoints, linear thinking will often come up short. On the other hand, creativity by definition involves the application of new information to old problems and the conception of new viewpoints and ideas. For this you will be most effective if you learn to operate in a nonlinear manner; that is, use your creative brain. Stated differently, if you think in a linear manner, you'll tend to be conservative and keep coming up with techniques which are already known. This, of course, is just what you don't want.\n\n[요약]\nLogical thinking works well with familiar problems but falls short in dealing with new ideas, for which (A) ________ thinking is needed to come up with (B) ________ solutions.`, options: ["① creative …… proven", "② innovative …… instant", "③ creative …… superior", "④ Flexible …… innovative", "⑤ Logical …… collaborative"], answer: 1 },
      { id: 41, category: "사회 (장문: 제목)", content: PASSAGE_41_42, options: ["①", "②", "③", "④", "⑤"], answer: 1 },
      { id: 42, category: "사회 (장문: 어휘)", content: PASSAGE_41_42 + `\n\n(a) accuracy, (b) include, (c) quality, (d) morally insulating, (e) escape`, options: ["① (a)", "② (b)", "③ (c)", "④ (d)", "⑤ (e)"], answer: 2 },
      { id: 43, category: "문학 (장문: 순서)", content: PASSAGE_43_45, options: ["① (B)-(D)-(C)", "② (C)-(D)-(B)", "③ (D)-(C)-(B)", "④ (C)-(B)-(D)", "⑤ (D)-(B)-(C)"], answer: 3 },
      { id: 44, category: "문학 (장문: 지칭 추론)", content: PASSAGE_43_45 + `\n\n(a) he (Jack), (b) you (Jack), (c) his (Victor), (d) You (Jack), (e) he (Jack)`, options: ["① (a)", "② (b)", "③ (c)", "④ (d)", "⑤ (e)"], answer: 3 },
      { id: 45, category: "문학 (장문: 내용 일치)", content: PASSAGE_43_45, options: ["①", "②", "③", "④", "⑤"], answer: 2 }
    ];

      book: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`,
      brain: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.54"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.54"/></svg>`,
      pen: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>`,
      send: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>`,
      arrowLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19L5 12L12 5"/></svg>`,
      chevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9L12 15L18 9"/></svg>`,
      sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>`,
      graduationCap: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
      message: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      dots: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`
    };

    // ==================== STATE ====================
    let state = {
      view: 'home',
      selectedId: EXAM_DATA[0].id,
      teacherMode: 'korean', // Default changed to korean
      modeType: 'reading',
      messages: [],
      isLoading: false,
      essayInputs: null
    };

    // ==================== UTILITIES ====================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function processInlineStyles(text) {
      if (!text) return '';
      return text.replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-green-900 bg-green-50 px-1 rounded mx-0.5 shadow-sm">$1</span>');
    }

    function renderFormattedText(text) {
      if (!text || typeof text !== 'string') return '';
      const lines = text.split('\n');
      let html = '';
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('###')) {
          const title = trimmed.replace(/^###\s*/, '');
          html += `<h3 class="text-xl font-bold text-green-700 mt-6 mb-3 flex items-center gap-2 border-b-2 border-green-100 pb-2">${processInlineStyles(escapeHtml(title))}</h3>`;
        } else if (trimmed.startsWith('- ')) {
          const content = trimmed.substring(2);
          html += `<div class="flex items-start gap-3 mb-2 pl-2 group hover:bg-green-50/50 p-1 rounded transition-colors"><span class="text-green-400 mt-1.5 text-[8px] flex-shrink-0">●</span><p class="text-gray-700 leading-relaxed flex-1">${processInlineStyles(escapeHtml(content))}</p></div>`;
        } else if (trimmed === '') {
          html += '<div class="h-2"></div>';
        } else {
          html += `<p class="text-gray-800 leading-7 mb-1.5 font-normal">${processInlineStyles(escapeHtml(line))}</p>`;
        }
      }
      return html;
    }

    function getQuestion(id) {
      return EXAM_DATA.find(q => q.id === parseInt(id));
    }

    // ==================== API ====================
    async function callChatAPI(questionId, teacherMode, modeType, messages, initialContext) {
      const question = getQuestion(questionId);
      
      try {
        const response = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            questionId,
            teacherMode,
            modeType,
            messages,
            initialContext,
            question: {
              content: question.content,
              options: question.options,
              answer: question.answer
            }
          })
        });

        const data = await response.json();
        
        if (!response.ok || data.error) {
          throw new Error(data.error || 'API request failed');
        }

        return data.response;
      } catch (error) {
        console.error('API Error:', error);
        throw error;
      }
    }

    // ==================== RENDER FUNCTIONS ====================
    function renderHomeScreen() {
      const optionsHtml = EXAM_DATA.map(q => 
        `<option value="${q.id}" ${q.id === state.selectedId ? 'selected' : ''}>${q.id}번 - ${q.category.split(' (')[0]}</option>`
      ).join('');

      return `
        <div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-green-50 to-emerald-50 p-6">
          <div class="w-full max-w-lg md:max-w-md bg-white rounded-3xl shadow-xl p-6 md:p-8 transform transition-all hover:scale-[1.01]">
            <div class="text-center mb-8">
              <div class="w-24 h-24 bg-white rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg ring-4 ring-green-50 overflow-hidden">
                <img src="${LOGO_URL}" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="hidden items-center justify-center w-full h-full bg-green-100">${Icons.book}</div>
              </div>
              <h1 class="text-2xl font-bold text-gray-900 mb-1">김수석 English Teacher</h1>
              <p class="text-sm text-gray-500">예비고1 바이블 - 영어편</p>
            </div>

            <div class="space-y-6">
              <!-- Question Select -->
              <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">1. 문제 선택</label>
                <div class="relative">
                  <select id="questionSelect" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-800 py-3 pl-4 pr-10 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 font-medium cursor-pointer hover:border-green-400 transition-colors">
                    ${optionsHtml}
                  </select>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none rotate-90">${Icons.chevronDown}</div>
                </div>
              </div>

              <!-- Teacher Select -->
              <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">2. 선생님 선택</label>
                <div class="flex gap-3">
                  <button id="btnKorean" class="flex-1 py-3 rounded-xl border-2 transition-all flex flex-col items-center justify-center gap-1 ${state.teacherMode === 'korean' ? 'border-green-600 bg-green-50 text-green-700 shadow-md' : 'border-gray-100 bg-gray-50 text-gray-400 hover:bg-gray-100'}">
                    <span class="text-xl">🇰🇷</span>
                    <span class="text-xs font-bold">Korean Teacher</span>
                  </button>
                  <button id="btnNative" class="flex-1 py-3 rounded-xl border-2 transition-all flex flex-col items-center justify-center gap-1 ${state.teacherMode === 'native' ? 'border-green-600 bg-green-50 text-green-700 shadow-md' : 'border-gray-100 bg-gray-50 text-gray-400 hover:bg-gray-100'}">
                    <span class="text-xl">🇺🇸</span>
                    <span class="text-xs font-bold">Native Teacher</span>
                  </button>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="space-y-3 pt-2">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">3. 학습 모드 선택</label>
                <button id="btnReading" class="w-full bg-green-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-green-700 hover:shadow-xl transition-all flex items-center justify-center gap-3 group">
                  <span class="text-green-200">${Icons.brain}</span>
                  <span>Deep Reading</span>
                  <span class="text-xs bg-green-500 px-2 py-0.5 rounded text-green-100">해설 강의</span>
                </button>
                
                <button id="btnEssay" class="w-full bg-white border-2 border-green-100 text-green-600 font-bold text-lg py-4 rounded-xl shadow-sm hover:border-green-300 hover:shadow-md transition-all flex items-center justify-center gap-3 group">
                  <span>${Icons.pen}</span>
                  <span>Discussion</span>
                  <span class="text-xs bg-green-50 px-2 py-0.5 rounded text-green-600">논술 토론</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderEssayInputScreen() {
      const question = getQuestion(state.selectedId);
      
      return `
        <div class="flex flex-col h-screen bg-gray-50 overflow-hidden">
          <!-- Header -->
          <div class="bg-white shadow-sm px-6 py-4 flex items-center justify-between z-10 border-b border-gray-200">
            <button id="btnBack" class="flex items-center gap-2 text-gray-500 hover:text-green-600 transition-colors">
              ${Icons.arrowLeft}
            </button>
            <div class="text-center font-bold text-gray-800 text-lg flex items-center gap-2">
              <span class="text-green-600">${Icons.pen}</span>
              <span>Essay Preparation</span>
            </div>
            <div class="w-20"></div>
          </div>

          <div class="flex-1 overflow-y-auto p-6 md:p-8 max-w-4xl mx-auto w-full">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
              <h3 class="font-bold text-green-700 mb-2 flex items-center gap-2">
                ${Icons.book}
                Question ${question.id} Context
              </h3>
              <p class="text-gray-600 text-sm leading-relaxed whitespace-pre-wrap max-h-40 overflow-y-auto bg-gray-50 p-3 rounded-lg">${escapeHtml(question.content)}</p>
            </div>

            <div class="space-y-6">
              <!-- Korean Input -->
              <div class="flex flex-col gap-2">
                <label class="font-semibold text-gray-700 flex items-center gap-2">
                  <span class="bg-green-100 text-green-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                  글의 전반적인 내용 이해 (한국어)
                </label>
                <textarea id="koreanInput" class="w-full h-32 p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all shadow-sm break-words whitespace-pre-wrap" placeholder="이 지문은 어떤 상황이고, 필자는 무엇을 주장하고 있나요?"></textarea>
              </div>

              <!-- English Input -->
              <div class="flex flex-col gap-2">
                <label class="font-semibold text-gray-700 flex items-center gap-2">
                  <span class="bg-green-100 text-green-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                  본문 요약 (English Summary)
                </label>
                <textarea id="englishInput" class="w-full h-32 p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all shadow-sm font-sans break-words whitespace-pre-wrap" placeholder="Summarize the text in English..."></textarea>
              </div>

              <button id="btnStartChat" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                ${Icons.message}
                선생님과 대화 시작하기 (${state.teacherMode === 'native' ? 'Native' : 'Korean'})
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderChatMessage(msg) {
      const isUser = msg.role === 'user';
      const safeText = typeof msg.text === 'string' ? msg.text : '';
      
      return `
        <div class="flex w-full mb-6 ${isUser ? 'justify-end' : 'justify-start'} animate-fadeIn">
          <div class="flex flex-col max-w-[95%] md:max-w-[85%] ${isUser ? 'items-end' : 'items-start'}">
            <div class="flex ${isUser ? 'flex-row-reverse' : 'flex-row'} items-start gap-2 md:gap-3">
              <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 shadow-lg ring-2 ring-white overflow-hidden ${isUser ? 'bg-green-600' : 'bg-white border border-green-100'}">
                ${isUser 
                  ? `<span class="text-white">${Icons.graduationCap}</span>` 
                  : `<img src="${LOGO_URL}" alt="Teacher" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'text-green-400\\'>${Icons.sparkles}</span>';">`
                }
              </div>
              
              <div class="p-3.5 md:p-5 rounded-2xl shadow-md break-words ${
                isUser 
                  ? 'bg-green-600 text-white rounded-tr-none' 
                  : msg.isError 
                    ? 'bg-red-50 text-red-600 border border-red-200 rounded-tl-none'
                    : 'bg-white text-gray-800 border border-gray-100 rounded-tl-none'
              }">
                ${isUser 
                  ? `<div class="whitespace-pre-wrap leading-relaxed text-sm md:text-base">${escapeHtml(safeText)}</div>`
                  : `<div class="font-sans text-sm md:text-base">${renderFormattedText(safeText)}</div>`
                }
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderChatScreen() {
      const question = getQuestion(state.selectedId);
      
      const messagesHtml = state.messages.map(msg => renderChatMessage(msg)).join('');
      
      const loadingHtml = state.isLoading && state.messages.length === 0 
        ? `<div class="flex flex-col items-center justify-center h-full text-gray-400 gap-4 animate-pulse">
             <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center"><span class="text-green-400">${Icons.brain}</span></div>
             <p class="text-sm font-medium">선생님이 내용을 분석 중입니다...</p>
           </div>`
        : '';
      
      const typingIndicator = state.isLoading && state.messages.length > 0
        ? `<div class="flex w-full mb-6 justify-start animate-fadeIn">
             <div class="flex items-center gap-3">
               <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex-shrink-0 flex items-center justify-center">
                 <span class="text-white animate-pulse">${Icons.sparkles}</span>
               </div>
               <div class="h-10 bg-white border border-gray-100 rounded-2xl w-24 flex items-center justify-center shadow-sm">
                 <span class="text-gray-400 animate-pulse">${Icons.dots}</span>
               </div>
             </div>
           </div>`
        : '';

      return `
        <div class="flex flex-col h-screen bg-gray-100">
          <!-- Header -->
          <div class="bg-white shadow-sm px-4 md:px-6 py-4 flex items-center justify-between z-10 border-b border-gray-200">
            <button id="btnBack" class="flex items-center gap-2 text-gray-500 hover:text-green-600 transition-colors group">
              <div class="p-2 rounded-full group-hover:bg-green-50 transition-colors">${Icons.arrowLeft}</div>
              <span class="text-sm font-medium hidden md:inline">나가기</span>
            </button>
            <div class="text-center absolute left-1/2 transform -translate-x-1/2">
              <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2 justify-center">
                <div class="w-6 h-6 overflow-hidden flex items-center justify-center">
                  <img src="${LOGO_URL}" alt="Logo" class="w-full h-full object-contain" onerror="this.style.display='none';">
                </div>
                ${state.modeType === 'reading' ? 'Deep Reading' : 'Discussion'}
              </h2>
              <span class="text-[10px] font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded-full mt-1 inline-block">
                ${question.id}번 • ${state.teacherMode === 'native' ? 'Native Teacher' : 'Korean Teacher'}
              </span>
            </div>
            <div class="w-16 md:w-32"></div>
          </div>

          <!-- Messages -->
          <div id="messagesContainer" class="flex-1 overflow-y-auto p-3 md:p-6 space-y-4 bg-gray-50/50 scrollbar-hide">
            ${loadingHtml}
            ${messagesHtml}
            ${typingIndicator}
            <div id="messagesEnd"></div>
          </div>

          <!-- Input -->
          <div class="bg-white p-4 border-t border-gray-200">
            <div class="max-w-4xl mx-auto relative flex items-center">
              <input
                type="text"
                id="chatInput"
                placeholder="${state.teacherMode === 'native' ? 'Ask anything...' : '궁금한 점을 물어보세요!'}"
                ${state.isLoading ? 'disabled' : ''}
                class="w-full bg-gray-100 text-gray-900 placeholder-gray-400 border-0 rounded-full py-3 pl-5 pr-14 focus:ring-2 focus:ring-green-500 focus:bg-white transition-all shadow-inner"
              />
              <button id="btnSend" ${state.isLoading ? 'disabled' : ''} class="absolute right-2 p-2 bg-green-600 text-white rounded-full hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md active:scale-95">
                ${Icons.send}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // ==================== EVENT HANDLERS ====================
    function attachHomeEvents() {
      document.getElementById('questionSelect')?.addEventListener('change', (e) => {
        state.selectedId = parseInt(e.target.value);
      });

      document.getElementById('btnKorean')?.addEventListener('click', () => {
        state.teacherMode = 'korean';
        render();
      });

      document.getElementById('btnNative')?.addEventListener('click', () => {
        state.teacherMode = 'native';
        render();
      });

      document.getElementById('btnReading')?.addEventListener('click', () => {
        state.modeType = 'reading';
        state.messages = [];
        state.view = 'chat';
        render();
        startChatSession();
      });

      document.getElementById('btnEssay')?.addEventListener('click', () => {
        state.modeType = 'essay';
        state.view = 'essay-input';
        render();
      });
    }

    function attachEssayInputEvents() {
      document.getElementById('btnBack')?.addEventListener('click', () => {
        state.view = 'home';
        render();
      });

      document.getElementById('btnStartChat')?.addEventListener('click', () => {
        const korean = document.getElementById('koreanInput').value.trim();
        const english = document.getElementById('englishInput').value.trim();

        if (!korean || !english) {
          alert('두 칸을 모두 채워주세요!');
          return;
        }

        state.essayInputs = { korean, english };
        state.messages = [];
        state.view = 'chat';
        render();
        startChatSession();
      });
    }

    function attachChatEvents() {
      document.getElementById('btnBack')?.addEventListener('click', () => {
        state.view = 'home';
        state.messages = [];
        state.essayInputs = null;
        render();
      });

      const chatInput = document.getElementById('chatInput');
      const btnSend = document.getElementById('btnSend');

      btnSend?.addEventListener('click', sendMessage);
      chatInput?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      scrollToBottom();
    }

    async function sendMessage() {
      const chatInput = document.getElementById('chatInput');
      const text = chatInput.value.trim();
      
      if (!text || state.isLoading) return;

      chatInput.value = '';
      state.messages.push({ role: 'user', text });
      state.isLoading = true;
      render();

      try {
        const response = await callChatAPI(
          state.selectedId,
          state.teacherMode,
          state.modeType,
          state.messages.slice(0, -1), // Exclude the just-added user message
          null // No initial context for follow-up messages
        );

        state.messages.push({ role: 'model', text: response });
      } catch (error) {
        state.messages.push({ role: 'model', text: `Error: ${error.message}`, isError: true });
      }

      state.isLoading = false;
      render();
    }

    async function startChatSession() {
      state.isLoading = true;
      render();

      try {
        const response = await callChatAPI(
          state.selectedId,
          state.teacherMode,
          state.modeType,
          [],
          state.essayInputs
        );

        state.messages.push({ role: 'model', text: response });
      } catch (error) {
        state.messages.push({ role: 'model', text: `Error: ${error.message}`, isError: true });
      }

      state.isLoading = false;
      render();
    }

    function scrollToBottom() {
      setTimeout(() => {
        const end = document.getElementById('messagesEnd');
        end?.scrollIntoView({ behavior: 'smooth' });
      }, 100);
    }

    // ==================== MAIN RENDER ====================
    function render() {
      const app = document.getElementById('app');
      
      switch (state.view) {
        case 'home':
          app.innerHTML = renderHomeScreen();
          attachHomeEvents();
          break;
        case 'essay-input':
          app.innerHTML = renderEssayInputScreen();
          attachEssayInputEvents();
          break;
        case 'chat':
          app.innerHTML = renderChatScreen();
          attachChatEvents();
          break;
      }
    }

    // ==================== INIT ====================
    render();
  </script>
</body>
</html>
